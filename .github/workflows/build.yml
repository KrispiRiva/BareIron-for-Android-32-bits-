name: BareIron-Android-Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout BareIron Source
        uses: actions/checkout@v4
        with:
          repository: 'p2r3/bareiron'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: 'r26b'

      # FIXED: Specifically downloads Minecraft 1.21.8 as the error requested
      - name: Download Minecraft 1.21.8 Server Jar
        run: |
          mkdir -p notchian
          python3 -c '
          import urllib.request, json
          try:
              # Get version list
              manifest_url = "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json"
              manifest = json.loads(urllib.request.urlopen(manifest_url).read())
              
              # Find 1.21.8 specifically
              version_url = next(v["url"] for v in manifest["versions"] if v["id"] == "1.21.8")
              version_data = json.loads(urllib.request.urlopen(version_url).read())
              jar_url = version_data["downloads"]["server"]["url"]
              
              print(f"Found 1.21.8 at: {jar_url}")
              urllib.request.urlretrieve(jar_url, "notchian/server.jar")
              print("Download success.")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          '

      - name: Extract Minecraft Data (Registries)
        run: |
          chmod +x extract_registries.sh
          ./extract_registries.sh
          node build_registries.js

      - name: Compile for Android 6.0 (ARMv7 32-bit)
        run: |
          # Use the API 23 (Android 6.0) Clang compiler
          CC="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi23-clang"
          
          # Optimization Flags:
          # -O3: Max speed for your Snapdragon 210
          # -fPIE -pie: Mandatory for Android execution
          # -lm -lpthread: Standard libraries
          $CC -O3 *.c -I. -fPIE -pie -lm -lpthread -o bareiron-android
          
          echo "Build Complete."

      - name: Upload Finished Server
        uses: actions/upload-artifact@v4
        with:
          name: bareiron-android-32bit
          path: bareiron-android
