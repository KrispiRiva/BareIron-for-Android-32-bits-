name: BareIron-Android-Build

on:
  workflow_dispatch: # This gives you the "Run Workflow" button to build manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout BareIron Source
        uses: actions/checkout@v4
        with:
          repository: 'p2r3/bareiron'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: 'r26b'

      - name: Extract Minecraft Data (Registries)
        run: |
          # 1. This script downloads the official Minecraft Server JAR
          chmod +x extract_registries.sh
          ./extract_registries.sh
          
          # 2. This formats that data into C headers for the server
          node build_registries.js

      - name: Compile for Android 6.0 (ARMv7 32-bit)
        run: |
          # Define the specific Android 6 compiler from the NDK
          CC="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi23-clang"
          
          # Compile all .c files into one standalone binary
          # -O3: Maximum performance optimization
          # -fPIE -pie: Required for Android security
          # -lm -lpthread: Includes math and multi-threading libraries
          $CC -O3 *.c -I. -fPIE -pie -lm -lpthread -o bareiron-android
          
          echo "Build Complete."

      - name: Upload Finished Server
        uses: actions/upload-artifact@v4
        with:
          name: bareiron-android-32bit
          path: bareiron-android
